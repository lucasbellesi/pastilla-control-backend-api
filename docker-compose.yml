services:
  db:
    image: postgres:16-alpine
    container_name: pastilla_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pastilla_control
      POSTGRES_USER: pastilla
      POSTGRES_PASSWORD: pastilla
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pastilla -d pastilla_control"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: pastilla_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
